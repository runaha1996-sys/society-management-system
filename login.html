<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Aananda Premium Bungalows</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h2><i class="fas fa-building" style="color:var(--primary)"></i> Aananda</h2>
      <p class="subtitle">Sign in to your society portal</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Login</button>
        <p id="loginError" class="login-error"></p>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:.85rem;color:var(--text-secondary)">
        <a href="home.html" style="color:var(--primary)"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
      </p>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
