<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Aananda Society</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><i class="fas fa-building" style="font-size:1.4rem;color:var(--primary-light)"></i><span class="logo-text">Aananda</span></div>
      <nav class="sidebar-menu">
        <a href="dashboard.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
        <a href="members.html"><i class="fas fa-users"></i><span>Members</span></a>
        <a href="complaints.html"><i class="fas fa-exclamation-circle"></i><span>Complaints</span></a>
        <a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="expenses.html"><i class="fas fa-money-bill-wave"></i><span>Expenses</span></a>
        <a href="visitors.html"><i class="fas fa-user-clock"></i><span>Visitors</span></a>
        <a href="notices.html"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="top-navbar">
        <div class="left"><button class="toggle-sidebar" id="toggleSidebar"><i class="fas fa-bars"></i></button><span class="page-title">Settings</span></div>
        <div class="right">
          <button class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
          <div class="dropdown"><button class="icon-btn" onclick="toggleDropdown('notifMenu')"><i class="fas fa-bell"></i><span class="badge">3</span></button><div class="dropdown-menu notif-dropdown" id="notifMenu"><div class="notif-header">Notifications</div><div class="notif-item">Settings updated<br><small>Just now</small></div></div></div>
          <div class="dropdown"><button class="profile-btn" onclick="toggleDropdown('profileMenu')"><div class="avatar">A</div><span class="name">Admin</span><i class="fas fa-chevron-down" style="font-size:.7rem"></i></button><div class="dropdown-menu" id="profileMenu"><a href="settings.html"><i class="fas fa-user"></i> Profile</a><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
        </div>
      </header>
      <div class="content">
        <div class="content-header"><h1>Settings</h1></div>
        <div class="settings-grid">
          <div class="card">
            <div class="card-header"><h3>General Settings</h3></div>
            <div class="card-body">
              <div class="form-group">
                <label>Society Opening Balance (₹)</label>
                <input type="number" id="openingBalanceInput" placeholder="Enter opening balance">
              </div>
              <div class="form-group">
                <label>Maintenance Due Day (of every month)</label>
                <input type="number" id="dueDayInput" min="1" max="28" placeholder="e.g. 10">
                <small>Members not paying by this day will be charged ₹100 penalty.</small>
              </div>
              <button class="btn btn-primary btn-sm" onclick="updateSettings()">Save Settings</button>
            </div>
          </div>
          <!-- PROFILE -->
          <div class="card">
            <div class="card-header"><h3><i class="fas fa-user"></i> Profile Settings</h3></div>
            <div class="card-body">
              <div class="form-group"><label>Full Name</label><input type="text" value="Admin User"></div>
              <div class="form-group"><label>Email</label><input type="email" value="admin@aanandapremium.com"></div>
              <div class="form-group"><label>Phone</label><input type="tel" value="+91 98765 43210"></div>
              <div class="form-group"><label>Role</label><input type="text" value="Society Admin" disabled></div>
              <button class="btn btn-primary btn-sm"><i class="fas fa-save"></i> Update Profile</button>
            </div>
          </div>
          <!-- PASSWORD -->
          <div class="card">
            <div class="card-header"><h3><i class="fas fa-lock"></i> Change Password</h3></div>
            <div class="card-body">
              <div class="form-group"><label>Current Password</label><input type="password" placeholder="Enter current password"></div>
              <div class="form-group"><label>New Password</label><input type="password" placeholder="Enter new password"></div>
              <div class="form-group"><label>Confirm Password</label><input type="password" placeholder="Confirm new password"></div>
              <button class="btn btn-primary btn-sm"><i class="fas fa-key"></i> Change Password</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
