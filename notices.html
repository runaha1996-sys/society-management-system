<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices - Aananda Society</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><i class="fas fa-building" style="font-size:1.4rem;color:var(--primary-light)"></i><span class="logo-text">Aananda</span></div>
      <nav class="sidebar-menu">
        <a href="dashboard.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
        <a href="members.html"><i class="fas fa-users"></i><span>Members</span></a>
        <a href="complaints.html"><i class="fas fa-exclamation-circle"></i><span>Complaints</span></a>
        <a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="expenses.html"><i class="fas fa-money-bill-wave"></i><span>Expenses</span></a>
        <a href="visitors.html"><i class="fas fa-user-clock"></i><span>Visitors</span></a>
        <a href="notices.html"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="top-navbar">
        <div class="left"><button class="toggle-sidebar" id="toggleSidebar"><i class="fas fa-bars"></i></button><span class="page-title">Notices</span></div>
        <div class="right">
          <button class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
          <div class="dropdown"><button class="icon-btn" onclick="toggleDropdown('notifMenu')"><i class="fas fa-bell"></i><span class="badge">3</span></button><div class="dropdown-menu notif-dropdown" id="notifMenu"><div class="notif-header">Notifications</div><div class="notif-item">New notice posted<br><small>1 hour ago</small></div></div></div>
          <div class="dropdown"><button class="profile-btn" onclick="toggleDropdown('profileMenu')"><div class="avatar">A</div><span class="name">Admin</span><i class="fas fa-chevron-down" style="font-size:.7rem"></i></button><div class="dropdown-menu" id="profileMenu"><a href="settings.html"><i class="fas fa-user"></i> Profile</a><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
        </div>
      </header>
      <div class="content">
        <div class="content-header">
          <h1>Notices</h1>
          <button class="btn btn-primary btn-sm" onclick="openModal('addNoticeModal')"><i class="fas fa-plus"></i> Add Notice</button>
        </div>
        <div class="notices-grid">
          <!-- Notices loaded from API -->
        </div>
      </div>
    </div>
  </div>

  <!-- ADD NOTICE MODAL -->
  <div class="modal-overlay" id="addNoticeModal">
    <div class="modal">
      <div class="modal-header"><h3>Add Notice</h3><button class="modal-close" onclick="closeModal('addNoticeModal')">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Title</label><input type="text" placeholder="Notice title"></div>
        <div class="form-group"><label>Content</label><textarea rows="4" placeholder="Write your notice here..." style="resize:vertical"></textarea></div>
        <div class="form-group"><label>Date</label><input type="date"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-sm" onclick="closeModal('addNoticeModal')">Cancel</button><button class="btn btn-primary btn-sm">Publish</button></div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
