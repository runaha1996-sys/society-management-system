<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Aananda Society</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><i class="fas fa-building" style="font-size:1.4rem;color:var(--primary-light)"></i><span class="logo-text">Aananda</span></div>
      <nav class="sidebar-menu">
        <a href="dashboard.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
        <a href="members.html"><i class="fas fa-users"></i><span>Members</span></a>
        <a href="complaints.html"><i class="fas fa-exclamation-circle"></i><span>Complaints</span></a>
        <a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="expenses.html"><i class="fas fa-money-bill-wave"></i><span>Expenses</span></a>
        <a href="visitors.html"><i class="fas fa-user-clock"></i><span>Visitors</span></a>
        <a href="notices.html"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="top-navbar">
        <div class="left"><button class="toggle-sidebar" id="toggleSidebar"><i class="fas fa-bars"></i></button><span class="page-title">Reports</span></div>
        <div class="right">
          <button class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
          <div class="dropdown"><button class="icon-btn" onclick="toggleDropdown('notifMenu')"><i class="fas fa-bell"></i><span class="badge">3</span></button><div class="dropdown-menu notif-dropdown" id="notifMenu"><div class="notif-header">Notifications</div><div id="notifList"><div class="notif-item">No new notifications</div></div></div></div>
          <div class="dropdown"><button class="profile-btn" onclick="toggleDropdown('profileMenu')"><div class="avatar">A</div><span class="name">Admin</span><i class="fas fa-chevron-down" style="font-size:.7rem"></i></button><div class="dropdown-menu" id="profileMenu"><a href="settings.html"><i class="fas fa-user"></i> Profile</a><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
        </div>
      </header>
      <div class="content">
        <div class="content-header"><h1>Reports & Analytics</h1></div>

        <div class="stats-grid">
          <div class="stat-card"><div class="icon-box blue"><i class="fas fa-rupee-sign"></i></div><div class="info"><h3 id="reportTotalRevenue">₹0</h3><p>Total Revenue</p></div></div>
          <div class="stat-card"><div class="icon-box green"><i class="fas fa-wallet"></i></div><div class="info"><h3 id="reportTotalExpenses">₹0</h3><p>Total Expenses</p></div></div>
          <div class="stat-card"><div class="icon-box orange"><i class="fas fa-piggy-bank"></i></div><div class="info"><h3 id="reportNetSavings">₹0</h3><p>Net Savings</p></div></div>
          <div class="stat-card"><div class="icon-box red"><i class="fas fa-exclamation-triangle"></i></div><div class="info"><h3 id="reportPendingComplaints">0</h3><p>Open Complaints</p></div></div>
        </div>

        <div class="charts-grid">
          <div class="card">
            <div class="card-header"><h3>Monthly Revenue</h3></div>
            <div class="card-body"><canvas id="monthlyRevenue" height="250"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><h3>Complaint Status</h3></div>
            <div class="card-body"><canvas id="complaintAnalysis" height="250"></canvas></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
