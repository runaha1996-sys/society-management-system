<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses - Aananda Society</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><i class="fas fa-building" style="font-size:1.4rem;color:var(--primary-light)"></i><span class="logo-text">Aananda</span></div>
      <nav class="sidebar-menu">
        <a href="index.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
        <a href="members.html"><i class="fas fa-users"></i><span>Members</span></a>
        <a href="complaints.html"><i class="fas fa-exclamation-circle"></i><span>Complaints</span></a>
        <a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="expenses.html" class="active"><i class="fas fa-money-bill-wave"></i><span>Expenses</span></a>
        <a href="visitors.html"><i class="fas fa-user-clock"></i><span>Visitors</span></a>
        <a href="notices.html"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="top-navbar">
        <div class="left"><button class="toggle-sidebar" id="toggleSidebar"><i class="fas fa-bars"></i></button><span class="page-title">Expenses</span></div>
        <div class="right">
          <button class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
          <div class="dropdown"><button class="profile-btn" onclick="toggleDropdown('profileMenu')"><div class="avatar">A</div><span class="name">Admin</span><i class="fas fa-chevron-down" style="font-size:.7rem"></i></button><div class="dropdown-menu" id="profileMenu"><a href="settings.html"><i class="fas fa-user"></i> Profile</a><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
        </div>
      </header>
      <div class="content">
        <div class="content-header">
          <h1>Expenses</h1>
          <div class="toolbar">
            <button class="btn btn-primary btn-sm" onclick="openModal('addExpenseModal')"><i class="fas fa-plus"></i> Add Expense</button>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card"><div class="icon-box red"><i class="fas fa-arrow-down"></i></div><div class="info"><h3 id="statTotalExpenses">₹0</h3><p>Total Expenses</p></div></div>
          <div class="stat-card"><div class="icon-box blue"><i class="fas fa-piggy-bank"></i></div><div class="info"><h3 id="statTotalSavings">₹0</h3><p>Net Savings</p></div></div>
          <div class="stat-card"><div class="icon-box orange"><i class="fas fa-wallet"></i></div><div class="info"><h3 id="statOpeningBalance">₹0</h3><p>Opening Balance</p></div></div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="table-container">
              <table id="expenseTable">
                <thead><tr><th>#</th><th>Title/Description</th><th>Category</th><th>Amount</th><th>Date</th><th>Month</th><th>Action</th></tr></thead>
                <tbody>
                  <!-- Data loaded from API -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD EXPENSE MODAL -->
  <div class="modal-overlay" id="addExpenseModal">
    <div class="modal">
      <div class="modal-header"><h3>Add New Expense</h3><button class="modal-close" onclick="closeModal('addExpenseModal')">&times;</button></div>
      <div class="modal-body">
        <div class="form-group">
          <label>Expense Title</label>
          <input type="text" id="expenseTitle" list="expenseSuggestions" placeholder="Select or type a reason...">
          <datalist id="expenseSuggestions">
            <option value="Electricity Bill">
            <option value="Water Bill">
            <option value="Security Salary">
            <option value="Cleaning Staff">
            <option value="Maintenance Work">
            <option value="Gardening">
            <option value="Miscellaneous">
          </datalist>
        </div>
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="expenseAmount" placeholder="Enter amount"></div>
        <div class="form-group"><label>Date</label><input type="date" id="expenseDate"></div>
        <div class="form-group">
          <label>Month</label>
          <select id="expenseMonth">
            <option value="January">January</option><option value="February">February</option><option value="March">March</option>
            <option value="April">April</option><option value="May">May</option><option value="June">June</option>
            <option value="July">July</option><option value="August">August</option><option value="September">September</option>
            <option value="October">October</option><option value="November">November</option><option value="December">December</option>
          </select>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-sm" onclick="closeModal('addExpenseModal')">Cancel</button><button class="btn btn-primary btn-sm" onclick="addExpense()">Save Expense</button></div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
