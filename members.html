<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members - Aananda Society</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><i class="fas fa-building" style="font-size:1.4rem;color:var(--primary-light)"></i><span class="logo-text">Aananda</span></div>
      <nav class="sidebar-menu">
        <a href="dashboard.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
        <a href="members.html"><i class="fas fa-users"></i><span>Members</span></a>
        <a href="complaints.html"><i class="fas fa-exclamation-circle"></i><span>Complaints</span></a>
        <a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="expenses.html"><i class="fas fa-money-bill-wave"></i><span>Expenses</span></a>
        <a href="visitors.html"><i class="fas fa-user-clock"></i><span>Visitors</span></a>
        <a href="notices.html"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="top-navbar">
        <div class="left"><button class="toggle-sidebar" id="toggleSidebar"><i class="fas fa-bars"></i></button><span class="page-title">Members</span></div>
        <div class="right">
          <button class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
          <div class="dropdown"><button class="icon-btn" onclick="toggleDropdown('notifMenu')"><i class="fas fa-bell"></i><span class="badge">3</span></button><div class="dropdown-menu notif-dropdown" id="notifMenu"><div class="notif-header">Notifications</div><div class="notif-item">Maintenance due for Block A<br><small>2 hours ago</small></div></div></div>
          <div class="dropdown"><button class="profile-btn" onclick="toggleDropdown('profileMenu')"><div class="avatar">A</div><span class="name">Admin</span><i class="fas fa-chevron-down" style="font-size:.7rem"></i></button><div class="dropdown-menu" id="profileMenu"><a href="settings.html"><i class="fas fa-user"></i> Profile</a><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
        </div>
      </header>
      <div class="content">
        <div class="content-header">
          <h1>Members</h1>
          <div class="toolbar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="memberSearch" placeholder="Search members..." oninput="searchTable('memberSearch','memberTable')"></div>
            <button class="btn btn-primary btn-sm" onclick="openModal('addMemberModal')"><i class="fas fa-plus"></i> Add Member</button>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <div class="table-container">
              <table id="memberTable">
                <thead><tr><th>ID</th><th>Name</th><th>Flat No</th><th>Phone</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                  <!-- Data loaded from API -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD MEMBER MODAL -->
  <div class="modal-overlay" id="addMemberModal">
    <div class="modal">
      <div class="modal-header"><h3>Add New Member</h3><button class="modal-close" onclick="closeModal('addMemberModal')">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Full Name</label><input type="text" placeholder="Enter full name"></div>
        <div class="form-group"><label>Flat No</label><input type="text" placeholder="e.g. A-101"></div>
        <div class="form-group"><label>Phone</label><input type="tel" placeholder="+91"></div>
        <div class="form-group"><label>Email</label><input type="email" placeholder="email@example.com"></div>
        <div class="form-group"><label>Password</label><input type="password" placeholder="Set member password"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-sm" onclick="closeModal('addMemberModal')">Cancel</button><button class="btn btn-primary btn-sm" onclick="addMember()">Save Member</button></div>
    </div>
  </div>
  <!-- EDIT MEMBER MODAL -->
  <div class="modal-overlay" id="editMemberModal">
    <div class="modal">
      <div class="modal-header"><h3>Edit Member</h3><button class="modal-close" onclick="closeModal('editMemberModal')">&times;</button></div>
      <div class="modal-body">
        <input type="hidden" id="editMemberId">
        <div class="form-group"><label>Full Name</label><input type="text" id="editMemberName" placeholder="Enter full name"></div>
        <div class="form-group"><label>Flat No</label><input type="text" id="editMemberFlat" placeholder="e.g. A-101"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="editMemberPhone" placeholder="+91"></div>
        <div class="form-group"><label>Email</label><input type="email" id="editMemberEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label>New Password (Leave blank to keep current)</label><input type="password" id="editMemberPassword" placeholder="Set new password"></div>
        <div class="form-group">
          <label>Status</label>
          <select id="editMemberStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-sm" onclick="closeModal('editMemberModal')">Cancel</button><button class="btn btn-primary btn-sm" onclick="updateMember()">Update Member</button></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
